<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6366f1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TimeFlow">
<title>TimeFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --bg:      #eef0f8;
  --surface: #ffffff;
  --indigo:  #6366f1;
  --indigod: #4f46e5;
  --indigog: rgba(99,102,241,.13);
  --violet:  #8b5cf6;
  --amber:   #f59e0b;
  --amberg:  rgba(245,158,11,.13);
  --green:   #10b981;
  --greeng:  rgba(16,185,129,.13);
  --greenb:  rgba(16,185,129,.35);
  --red:     #ef4444;
  --redg:    rgba(239,68,68,.12);
  --redb:    rgba(239,68,68,.3);
  --text:    #1e1b4b;
  --mid:     #64748b;
  --dim:     #94a3b8;
  --border:  #dde1f0;
  --sans:    'Inter', system-ui, sans-serif;
  --r:       12px;
  --rl:      18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh}
.app{max-width:480px;margin:0 auto;padding-bottom:90px}

/* HEADER */
.hdr{
  background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
  padding:16px 14px 14px;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(99,102,241,.35);
  position:sticky;top:0;z-index:30;
}
.logo{font-size:1.3rem;font-weight:800;color:#fff;letter-spacing:-.5px;white-space:nowrap}
.logo span{font-weight:400;font-size:.7rem;color:rgba(255,255,255,.6);margin-left:4px}
.empresa-sel{
  flex:1;min-width:0;
  background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);
  border-radius:var(--r);padding:7px 10px;display:flex;align-items:center;gap:6px;
}
.empresa-sel select{flex:1;min-width:0;background:transparent;border:none;color:#fff;font-family:var(--sans);font-weight:700;font-size:.85rem;cursor:pointer;outline:none;-webkit-appearance:none}
.empresa-sel select option{background:#4f46e5}
.hdr-btns{display:flex;gap:5px}
.ibtn{width:32px;height:32px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);border-radius:var(--r);color:#fff;font-size:.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.ibtn:active{background:rgba(255,255,255,.38)}

/* NAV */
.nav{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);display:flex;padding:0 10px 10px;gap:6px;position:sticky;top:62px;z-index:20}
.ntab{flex:1;background:rgba(255,255,255,.15);border:none;border-radius:var(--r);color:rgba(255,255,255,.8);font-family:var(--sans);font-size:.75rem;font-weight:600;padding:10px 4px;cursor:pointer;transition:all .2s}
.ntab.active{background:#fff;color:var(--indigo);box-shadow:0 2px 10px rgba(0,0,0,.12)}

/* PANES */
.pane{display:none;padding:14px 12px 0}
.pane.active{display:block}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-label{font-size:1.1rem;font-weight:800;color:var(--text)}
.marrow{width:36px;height:36px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r);color:var(--indigo);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.marrow:active{background:var(--indigog);border-color:var(--indigo)}

/* CALENDAR */
.cal{background:var(--surface);border-radius:var(--rl);overflow:hidden;box-shadow:0 2px 12px rgba(99,102,241,.12);margin-bottom:14px;display:grid;grid-template-columns:repeat(7,1fr);border:2px solid var(--border)}
.cwk{text-align:center;font-size:.62rem;font-weight:700;color:var(--indigo);letter-spacing:.5px;text-transform:uppercase;padding:10px 0 6px;border-bottom:2px solid var(--border);background:var(--indigog)}
.cday{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;gap:3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.cday:nth-child(7n){border-right:none}
.cday:active{transform:scale(.88)}
.cday.empty{cursor:default;pointer-events:none;background:#f8f9fc}
.cday-n{font-size:.82rem;font-weight:600;color:var(--mid);line-height:1}
.cday-d{width:5px;height:5px;border-radius:50%}
.cday.ok{background:var(--greeng)}
.cday.ok .cday-n{color:var(--green);font-weight:700}
.cday.ok .cday-d{background:var(--green)}
.cday.bad{background:var(--redg)}
.cday.bad .cday-n{color:var(--red);font-weight:700}
.cday.bad .cday-d{background:var(--red)}
.cday.sel{background:linear-gradient(135deg,var(--indigo),var(--violet))}
.cday.sel .cday-n{color:#fff;font-weight:800}
.cday.sel .cday-d{background:rgba(255,255,255,.7)}
.cday.today .cday-n{text-decoration:underline;text-underline-offset:2px;color:var(--indigo)}

/* CARDS con color de acento superior */
.card{background:var(--surface);border-radius:var(--rl);overflow:hidden;box-shadow:0 2px 12px rgba(99,102,241,.1);margin-bottom:12px;border:2px solid var(--border)}
.card-accent{height:5px;background:linear-gradient(90deg,var(--indigo),var(--violet))}
.card-accent.amber{background:linear-gradient(90deg,var(--amber),#fb923c)}
.card-accent.violet{background:linear-gradient(90deg,var(--violet),#ec4899)}
.card-accent.green{background:linear-gradient(90deg,var(--green),#06b6d4)}

/* DAY TITLE */
.day-title{padding:12px 16px;font-size:.82rem;font-weight:600;color:var(--mid);border-bottom:2px solid var(--border);background:#f8f9fc;display:flex;align-items:center;gap:6px}

/* TURNOS */
.turno{padding:14px 16px;border-bottom:2px solid var(--border)}
.turno-lbl{font-size:.72rem;font-weight:700;color:var(--mid);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.turno-lbl::before{content:'';width:9px;height:9px;border-radius:50%;flex-shrink:0}
.turno-m .turno-lbl{color:#d97706}
.turno-m .turno-lbl::before{background:linear-gradient(135deg,#f59e0b,#fb923c)}
.turno-t .turno-lbl{color:var(--violet)}
.turno-t .turno-lbl::before{background:linear-gradient(135deg,#8b5cf6,#ec4899)}

.time-row{display:grid;grid-template-columns:1fr 1fr 76px;gap:8px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.63rem;font-weight:700;color:var(--dim);letter-spacing:.3px;text-transform:uppercase}
.field input{background:#f1f3f8;border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:.9rem;font-weight:600;padding:9px 10px;width:100%;outline:none;transition:all .15s;-webkit-appearance:none}
.field input:focus{border-color:var(--indigo);background:#fff;box-shadow:0 0 0 3px var(--indigog)}

.now-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.nbtn{background:#f1f3f8;border:2px solid var(--border);border-radius:10px;color:var(--mid);font-family:var(--sans);font-size:.72rem;font-weight:700;padding:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.nbtn.in:active{background:var(--greeng);border-color:var(--greenb);color:var(--green)}
.nbtn.out:active{background:var(--redg);border-color:var(--redb);color:var(--red)}

/* TOTAL BAR */
.total-bar{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border)}
.total-wrap{display:flex;flex-direction:column;gap:2px}
.total-lbl{font-size:.63rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.total-h{font-size:2.5rem;font-weight:800;color:var(--text);letter-spacing:-2px;line-height:1}
.total-h span{font-size:1rem;font-weight:500;color:var(--mid);letter-spacing:0}
.chip{font-size:.72rem;font-weight:700;padding:7px 16px;border-radius:999px;border:2px solid}
.chip.ok{color:var(--green);border-color:var(--greenb);background:var(--greeng)}
.chip.bad{color:var(--red);border-color:var(--redb);background:var(--redg)}
.chip.empty{color:var(--dim);border-color:var(--border);background:#f8f9fc}

.fire-msg{text-align:center;font-size:.82rem;font-weight:800;color:var(--red);padding:9px;display:none;border-bottom:2px solid var(--border);background:var(--redg)}
.fire-msg.show{display:block}

.importe-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:2px solid var(--border)}
.importe-lbl{font-size:.75rem;font-weight:600;color:var(--mid)}
.importe-val{font-size:1.15rem;font-weight:800;color:var(--indigo)}

/* ACTIONS */
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px}
.abtn{font-family:var(--sans);font-size:.8rem;font-weight:700;padding:13px;border-radius:var(--r);border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.abtn.save{background:linear-gradient(135deg,var(--indigo),var(--violet));color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.abtn.save:active{opacity:.85;transform:scale(.97)}
.abtn.clr{background:#f1f3f8;border:2px solid var(--border);color:var(--mid)}
.abtn.clr:active{color:var(--red);border-color:var(--redb);background:var(--redg)}

/* STATS */
.section-title{font-size:.72rem;font-weight:700;color:var(--mid);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
.cfg-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px}
.cfg-btn{margin:0 16px 14px;width:calc(100% - 32px);font-family:var(--sans);font-size:.8rem;font-weight:700;padding:12px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--indigo),var(--violet));color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.cfg-btn:active{opacity:.85}

.week-head{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--indigog);padding:10px 16px;font-size:.68rem;font-weight:700;color:var(--indigo);letter-spacing:.3px;text-transform:uppercase;border-bottom:2px solid var(--border)}
.week-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:12px 16px;border-bottom:2px solid var(--border);font-size:.85rem;align-items:center}
.week-row:last-child{border-bottom:none}
.week-row .wn{font-size:.75rem;font-weight:600;color:var(--mid)}
.week-row .wh{font-weight:800;color:var(--text)}
.week-row .we{font-weight:700;color:var(--indigo)}

.month-total{background:linear-gradient(135deg,var(--indigo) 0%,var(--violet) 100%);border-radius:var(--rl);padding:18px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 24px rgba(99,102,241,.3)}
.mtl{font-size:.65rem;font-weight:600;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.mth{font-size:1.8rem;font-weight:800;color:#fff;letter-spacing:-1px}
.mte{font-size:1.2rem;font-weight:700;color:rgba(255,255,255,.9)}

/* REPORTS */
.report-btns{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.rbtn{font-size:.75rem;font-weight:700;padding:9px 14px;border-radius:var(--r);border:2px solid var(--border);background:var(--surface);color:var(--mid);cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rbtn:active{border-color:var(--indigo);color:var(--indigo);background:var(--indigog)}
.rbtn.wa{border-color:rgba(16,185,129,.35);color:var(--green);background:var(--greeng)}
.rbtn.pdf{border-color:var(--redb);color:var(--red);background:var(--redg)}
.range-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:10px}
.range-row input[type=date]{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:.82rem;font-weight:500;padding:9px 10px;outline:none;width:100%;-webkit-appearance:none}
.range-row input[type=date]:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigog)}
.preview{background:var(--surface);border:2px solid var(--border);border-radius:var(--rl);padding:14px;max-height:280px;overflow:auto;font-family:'Courier New',monospace;font-size:.73rem;color:var(--text);line-height:1.8;white-space:pre-wrap;box-shadow:0 2px 8px rgba(0,0,0,.05)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input[type=time]::-webkit-calendar-picker-indicator,
input[type=date]::-webkit-calendar-picker-indicator{filter:opacity(.5)}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="logo">TimeFlow<span>PRO</span></div>
    <div class="empresa-sel">
      <span>🏢</span>
      <select id="empresaSelect"></select>
    </div>
    <div class="hdr-btns">
      <button class="ibtn" id="nuevaEmpresaBtn">＋</button>
      <button class="ibtn" id="editarEmpresaBtn">✎</button>
      <button class="ibtn" id="eliminarEmpresaBtn">✕</button>
    </div>
  </div>

  <div class="nav">
    <button class="ntab active" data-tab="calendar">📅 Día</button>
    <button class="ntab" data-tab="stats">📊 Semana</button>
    <button class="ntab" data-tab="reports">📄 Informe</button>
  </div>

  <!-- PANE CALENDAR -->
  <div class="pane active" id="calendarPane">
    <div class="month-nav">
      <button class="marrow" id="prevMonthBtn">◀</button>
      <div class="month-label" id="monthYearDisplay"></div>
      <button class="marrow" id="nextMonthBtn">▶</button>
    </div>

    <div class="cal" id="calendarGrid"></div>

    <div class="card">
      <div class="card-accent"></div>
      <div class="day-title">📌 <span id="selectedDateTitle">Selecciona un día</span></div>

      <div class="turno turno-m">
        <div class="turno-lbl">Turno mañana</div>
        <div class="time-row">
          <div class="field"><label>Entrada</label><input type="time" id="mananaEntrada"></div>
          <div class="field"><label>Salida</label><input type="time" id="mananaSalida"></div>
          <div class="field"><label>Pausa min</label><input type="number" id="mananaPausa" min="0" step="5" value="0"></div>
        </div>
        <div class="now-row">
          <button class="nbtn in" id="mananaEntradaAhora">⏺ Entrada ya</button>
          <button class="nbtn out" id="mananaSalidaAhora">⏹ Salida ya</button>
        </div>
      </div>

      <div class="turno turno-t">
        <div class="turno-lbl">Turno tarde</div>
        <div class="time-row">
          <div class="field"><label>Entrada</label><input type="time" id="tardeEntrada"></div>
          <div class="field"><label>Salida</label><input type="time" id="tardeSalida"></div>
          <div class="field"><label>Pausa min</label><input type="number" id="tardePausa" min="0" step="5" value="0"></div>
        </div>
        <div class="now-row">
          <button class="nbtn in" id="tardeEntradaAhora">⏺ Entrada ya</button>
          <button class="nbtn out" id="tardeSalidaAhora">⏹ Salida ya</button>
        </div>
      </div>

      <div class="total-bar">
        <div class="total-wrap">
          <div class="total-lbl">Horas netas del día</div>
          <div class="total-h" id="totalHorasDia">--<span>h --m</span></div>
        </div>
        <div class="chip empty" id="estadoJornada">Sin datos</div>
      </div>

      <div class="fire-msg" id="mensajeExtra">🔥 ¡VAYA TELITA DE DÍA! 🔥</div>

      <div class="importe-row">
        <div class="importe-lbl">💰 Importe estimado</div>
        <div class="importe-val"><span id="importeDia">0.00</span> €</div>
      </div>

      <div class="act-row">
        <button class="abtn save" id="saveDayBtn">💾 Guardar día</button>
        <button class="abtn clr" id="clearDayBtn">🧹 Limpiar</button>
      </div>
    </div>
  </div>

  <!-- PANE STATS -->
  <div class="pane" id="statsPane">
    <div class="section-title">Configuración</div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-accent amber"></div>
      <div class="cfg-fields">
        <div class="field"><label>💰 €/hora</label><input type="number" id="globalHourlyRate" step="0.5" value="15"></div>
        <div class="field"><label>⏱ Mín. h/día</label><input type="number" id="minDailyHours" step="0.5" value="7.5"></div>
      </div>
      <button class="cfg-btn" id="updateConfigBtn">✓ Aplicar configuración</button>
    </div>

    <div class="section-title">Semanas del mes</div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-accent green"></div>
      <div class="week-head"><span>Semana</span><span>Horas</span><span>Importe</span></div>
      <div id="weeklyRowsContainer"></div>
    </div>

    <div class="month-total" id="monthSummaryShort">
      <div><div class="mtl">Total mes</div><div class="mth">--h --m</div></div>
      <div class="mte">-- €</div>
    </div>
  </div>

  <!-- PANE REPORTS -->
  <div class="pane" id="reportsPane">
    <div class="report-btns">
      <button class="rbtn" id="mesActualBtn">📆 Mes actual</button>
      <button class="rbtn" id="mesAnteriorBtn">◀ Anterior</button>
      <button class="rbtn" id="mesSiguienteBtn">Siguiente ▶</button>
    </div>
    <div class="range-row">
      <input type="date" id="reportDesde">
      <input type="date" id="reportHasta">
      <button class="rbtn" id="rangoLibreBtn">Rango</button>
    </div>
    <div class="report-btns">
      <button class="rbtn pdf" id="pdfMensualBtn">🖨 PDF mes</button>
      <button class="rbtn wa" id="compartirMensualBtn">📱 WhatsApp</button>
    </div>
    <div class="preview" id="informeResultado">Selecciona un período para generar el informe…</div>
  </div>

</div>

<script>
// ── SERVICE WORKER embebido ──
if ('serviceWorker' in navigator) {
  const sw=`const C='tf-v3';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])));self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res}).catch(()=>e.request.mode==='navigate'?caches.match('/'):undefined)))});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'/'}).catch(()=>{});
}

// ── MANIFEST + ICONOS embebidos ──
(function(){
  function icon(s){
    const c=document.createElement('canvas');c.width=c.height=s;
    const x=c.getContext('2d');
    const g=x.createLinearGradient(0,0,s,s);g.addColorStop(0,'#6366f1');g.addColorStop(1,'#8b5cf6');
    x.fillStyle=g;x.fillRect(0,0,s,s);
    x.fillStyle='#fff';x.font=`800 ${Math.floor(s*.38)}px sans-serif`;
    x.textAlign='center';x.textBaseline='middle';x.fillText('TF',s/2,s/2);
    return c.toDataURL('image/png');
  }
  const i192=icon(192),i512=icon(512);
  const mf={name:'TimeFlow',short_name:'TimeFlow',start_url:'/',display:'standalone',background_color:'#eef0f8',theme_color:'#6366f1',icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  const lm=document.createElement('link');lm.rel='manifest';lm.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/manifest+json'}));document.head.appendChild(lm);
  const la=document.createElement('link');la.rel='apple-touch-icon';la.href=i192;document.head.appendChild(la);
})();

// ── APP LOGIC ──
let empresas=['Mi trabajo'],empresaActiva='Mi trabajo',datosEmpresas={},workData={};
let globalRate=15,minHoursPerDay=7.5,currentDate=new Date(),selectedDateKey=null;
const $=id=>document.getElementById(id);

function fdk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function today(){return fdk(new Date())}
function save(){if(empresaActiva)datosEmpresas[empresaActiva]={workData,globalRate,minHoursPerDay};localStorage.setItem('tf_multi',JSON.stringify({empresas,activa:empresaActiva,datos:datosEmpresas}))}

function load(){
  const s=localStorage.getItem('tf_multi');
  if(s){const o=JSON.parse(s);empresas=o.empresas||['Mi trabajo'];empresaActiva=o.activa||empresas[0];datosEmpresas=o.datos||{};
    empresas.forEach(e=>{if(!datosEmpresas[e])datosEmpresas[e]={workData:{},globalRate:15,minHoursPerDay:7.5}});
    if(!datosEmpresas[empresaActiva])datosEmpresas[empresaActiva]={workData:{},globalRate:15,minHoursPerDay:7.5}}
  else{datosEmpresas={'Mi trabajo':{workData:{},globalRate:15,minHoursPerDay:7.5}}}
  loadEmpresa();syncSelect();
}

function loadEmpresa(){
  const d=datosEmpresas[empresaActiva];
  workData=d.workData||{};globalRate=d.globalRate??15;minHoursPerDay=d.minHoursPerDay??7.5;
  $('globalHourlyRate').value=globalRate;$('minDailyHours').value=minHoursPerDay;
  if(!selectedDateKey)selectedDateKey=today();
  renderCal();loadDay(selectedDateKey);calcStats();
}

function syncSelect(){
  $('empresaSelect').innerHTML='';
  empresas.forEach(e=>{const o=document.createElement('option');o.value=e;o.text=e;if(e===empresaActiva)o.selected=true;$('empresaSelect').appendChild(o)});
}

function cambiarEmpresa(){datosEmpresas[empresaActiva]={workData,globalRate,minHoursPerDay};empresaActiva=$('empresaSelect').value;loadEmpresa();save()}
function nuevaEmpresa(){const n=prompt('Nombre de la nueva empresa:');if(n&&!empresas.includes(n)){empresas.push(n);datosEmpresas[n]={workData:{},globalRate:15,minHoursPerDay:7.5};empresaActiva=n;save();syncSelect();loadEmpresa()}}
function editarEmpresa(){const n=prompt('Nuevo nombre:',empresaActiva);if(n&&n!==empresaActiva&&!empresas.includes(n)){const i=empresas.indexOf(empresaActiva);empresas[i]=n;datosEmpresas[n]=datosEmpresas[empresaActiva];delete datosEmpresas[empresaActiva];empresaActiva=n;save();syncSelect();loadEmpresa()}}
function eliminarEmpresa(){if(empresas.length===1){alert('Necesitas al menos una empresa');return}if(confirm(`¿Eliminar "${empresaActiva}"?`)){const i=empresas.indexOf(empresaActiva);empresas.splice(i,1);delete datosEmpresas[empresaActiva];empresaActiva=empresas[0];save();syncSelect();loadEmpresa()}}

function calcMin(e,s,p){if(!e||!s)return 0;const[eh,em]=e.split(':').map(Number),[sh,sm]=s.split(':').map(Number);let eM=eh*60+em,sM=sh*60+sm;if(sM<eM)sM+=1440;return Math.max(0,sM-eM-(p||0))}
function getDia(dk){const d=workData[dk]||{},m=d.manana||{},t=d.tarde||{};return{total:calcMin(m.entrada,m.salida,m.pausa)+calcMin(t.entrada,t.salida,t.pausa),tiene:!!(m.entrada&&m.salida)||(t.entrada&&t.salida)}}
function m2hm(m){return{h:Math.floor(m/60),m:m%60}}
function getDiaStats(dk){const{total,tiene}=getDia(dk);return{total,hd:total/60,imp:(total/60)*globalRate,tiene}}
function getMesStats(yr,mo){let tM=0,tI=0;const days=new Date(yr,mo+1,0).getDate();for(let d=1;d<=days;d++){const s=getDiaStats(`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);tM+=s.total;tI+=s.imp}return{total:tM,imp:tI}}

function renderCal(){
  const yr=currentDate.getFullYear(),mo=currentDate.getMonth();
  const off=(new Date(yr,mo,1).getDay()+6)%7,days=new Date(yr,mo+1,0).getDate();
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  $('monthYearDisplay').textContent=`${MN[mo]} ${yr}`;
  let h=['L','M','X','J','V','S','D'].map(d=>`<div class="cwk">${d}</div>`).join('');
  for(let i=0;i<off;i++)h+=`<div class="cday empty"></div>`;
  const tod=today();
  for(let d=1;d<=days;d++){
    const dk=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const{total,tiene}=getDia(dk);
    const st=tiene?(total/60>=minHoursPerDay?'ok':'bad'):'';
    h+=`<div class="cday ${st}${selectedDateKey===dk?' sel':''}${dk===tod?' today':''}" data-date="${dk}"><div class="cday-n">${d}</div><div class="cday-d"></div></div>`;
  }
  $('calendarGrid').innerHTML=h;
  $('calendarGrid').querySelectorAll('.cday[data-date]').forEach(el=>{
    el.addEventListener('click',()=>{selectedDateKey=el.dataset.date;renderCal();loadDay(selectedDateKey)});
  });
}

function fechaBonita(dk){
  const[y,m,d]=dk.split('-');
  let s=new Date(y,m-1,d).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}

function loadDay(dk){
  const d=workData[dk]||{},m=d.manana||{},t=d.tarde||{};
  $('mananaEntrada').value=m.entrada||'';$('mananaSalida').value=m.salida||'';$('mananaPausa').value=m.pausa||0;
  $('tardeEntrada').value=t.entrada||'';$('tardeSalida').value=t.salida||'';$('tardePausa').value=t.pausa||0;
  $('selectedDateTitle').textContent=fechaBonita(dk);
  preview();
}

function preview(){
  const mM=calcMin($('mananaEntrada').value,$('mananaSalida').value,parseInt($('mananaPausa').value)||0);
  const tM=calcMin($('tardeEntrada').value,$('tardeSalida').value,parseInt($('tardePausa').value)||0);
  const total=mM+tM,hd=total/60,imp=hd*globalRate;
  const{h,m}=m2hm(total);
  $('totalHorasDia').innerHTML=total===0?`--<span>h --m</span>`:`${h}<span>h ${String(m).padStart(2,'0')}m</span>`;
  $('importeDia').textContent=imp.toFixed(2);
  const chip=$('estadoJornada');
  if(total===0){chip.className='chip empty';chip.textContent='Sin datos'}
  else if(hd>=minHoursPerDay){chip.className='chip ok';chip.textContent='✓ Completa'}
  else{chip.className='chip bad';chip.textContent='✗ Incompleta'}
  $('mensajeExtra').classList.toggle('show',hd>=10&&total>0);
}

function guardarDia(){
  if(!selectedDateKey)return;
  workData[selectedDateKey]={
    manana:{entrada:$('mananaEntrada').value,salida:$('mananaSalida').value,pausa:parseInt($('mananaPausa').value)||0},
    tarde:{entrada:$('tardeEntrada').value,salida:$('tardeSalida').value,pausa:parseInt($('tardePausa').value)||0}
  };
  save();renderCal();calcStats();
}

function limpiar(){
  ['mananaEntrada','mananaSalida','tardeEntrada','tardeSalida'].forEach(id=>$(id).value='');
  $('mananaPausa').value=0;$('tardePausa').value=0;preview();
}

function ahora(id){const n=new Date();$(id).value=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;preview()}

function getWeeks(yr,mo){
  const weeks=[],last=new Date(yr,mo+1,0);
  let cur=new Date(yr,mo,1);cur.setDate(cur.getDate()-((cur.getDay()+6)%7));
  let wn=1;
  while(cur<=last){const days=[];for(let i=0;i<7;i++){const d=new Date(cur);if(d>last)break;days.push(fdk(d));cur.setDate(cur.getDate()+1)}weeks.push({n:wn++,days})}
  return weeks;
}

function calcStats(){
  const yr=currentDate.getFullYear(),mo=currentDate.getMonth();
  const weeks=getWeeks(yr,mo);
  $('weeklyRowsContainer').innerHTML='';
  for(const w of weeks){
    let tM=0,tI=0;w.days.forEach(dk=>{const s=getDiaStats(dk);tM+=s.total;tI+=s.imp});
    const{h,m}=m2hm(tM);
    const row=document.createElement('div');row.className='week-row';
    row.innerHTML=`<span class="wn">Sem ${w.n}</span><span class="wh">${h}h ${String(m).padStart(2,'0')}m</span><span class="we">${tI.toFixed(2)} €</span>`;
    $('weeklyRowsContainer').appendChild(row);
  }
  const tot=getMesStats(yr,mo);const{h,m}=m2hm(tot.total);
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  $('monthSummaryShort').innerHTML=`<div><div class="mtl">${MN[mo]} ${yr}</div><div class="mth">${h}h ${String(m).padStart(2,'0')}m</div></div><div class="mte">${tot.imp.toFixed(2)} €</div>`;
}

function diasRango(desde,hasta){
  const res=[];
  for(let d=new Date(desde);d<=new Date(hasta);d.setDate(d.getDate()+1)){
    const dk=fdk(d),s=getDiaStats(dk),dia=workData[dk]||{},mn=dia.manana||{},ta=dia.tarde||{};
    const{h,m}=m2hm(s.total);
    res.push({fecha:dk,mE:mn.entrada||'--',mS:mn.salida||'--',mP:mn.pausa||0,tE:ta.entrada||'--',tS:ta.salida||'--',tP:ta.pausa||0,min:s.total,imp:s.imp,hstr:`${h}h ${String(m).padStart(2,'0')}m`});
  }
  return res;
}

function textoInforme(dias,titulo,tMin,tImp){
  const{h,m}=m2hm(tMin);
  const ln=[`📊 ${titulo}`,`Empresa: ${empresaActiva}`,`${dias[0]?.fecha} → ${dias[dias.length-1]?.fecha}`,'─'.repeat(38)];
  for(const d of dias){
    if(d.min>0||d.mE!=='--'||d.tE!=='--'){
      ln.push(`\n${d.fecha}`);
      ln.push(`  🌞 ${d.mE} → ${d.mS}  (pausa ${d.mP} min)`);
      ln.push(`  🌙 ${d.tE} → ${d.tS}  (pausa ${d.tP} min)`);
      ln.push(`  ▸ ${d.hstr}  ·  ${d.imp.toFixed(2)} €`);
    }
  }
  ln.push('\n'+'─'.repeat(38));
  ln.push(`TOTAL  ${h}h ${String(m).padStart(2,'0')}m  ·  ${tImp.toFixed(2)} €`);
  return ln.join('\n');
}

function informeMes(offset){
  const f=new Date(currentDate.getFullYear(),currentDate.getMonth()+offset,1);
  const yr=f.getFullYear(),mo=f.getMonth();
  const p=`${yr}-${String(mo+1).padStart(2,'0')}-01`,u=`${yr}-${String(mo+1).padStart(2,'0')}-${new Date(yr,mo+1,0).getDate()}`;
  const dias=diasRango(p,u),tot=getMesStats(yr,mo);
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  $('informeResultado').textContent=textoInforme(dias,`Informe ${MN[mo]} ${yr}`,tot.total,tot.imp);
}

function rangoLibre(){
  const d=$('reportDesde').value,h=$('reportHasta').value;
  if(!d||!h){alert('Selecciona las dos fechas');return}
  const dias=diasRango(d,h),tM=dias.reduce((a,b)=>a+b.min,0),tI=dias.reduce((a,b)=>a+b.imp,0);
  $('informeResultado').textContent=textoInforme(dias,`Informe ${d} → ${h}`,tM,tI);
}

async function generarPDF(){
  const yr=currentDate.getFullYear(),mo=currentDate.getMonth();
  const p=`${yr}-${String(mo+1).padStart(2,'0')}-01`,u=`${yr}-${String(mo+1).padStart(2,'0')}-${new Date(yr,mo+1,0).getDate()}`;
  const dias=diasRango(p,u),tot=getMesStats(yr,mo);const{h,m}=m2hm(tot.total);
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  let html=`<div style="font-family:Arial;padding:1rem"><h2 style="color:#6366f1">${empresaActiva} — ${MN[mo]} ${yr}</h2><table border="1" cellpadding="6" style="width:100%;border-collapse:collapse;margin-top:1rem;font-size:12px"><tr style="background:#6366f1;color:white"><th>Fecha</th><th>Mañana</th><th>Tarde</th><th>Horas</th><th>€</th></tr>`;
  for(const d of dias)html+=`<tr><td>${d.fecha}</td><td>${d.mE}→${d.mS} (${d.mP}m)</td><td>${d.tE}→${d.tS} (${d.tP}m)</td><td>${d.hstr}</td><td>${d.imp.toFixed(2)}</td></tr>`;
  html+=`<tr style="font-weight:bold;background:#eef0f8"><td colspan="3">TOTAL</td><td>${h}h ${String(m).padStart(2,'0')}m</td><td>${tot.imp.toFixed(2)} €</td></tr></table></div>`;
  const div=document.createElement('div');div.innerHTML=html;document.body.appendChild(div);
  html2pdf().from(div).set({margin:.5,filename:`timeflow_${empresaActiva}_${p}.pdf`}).save().then(()=>document.body.removeChild(div));
}

function whatsapp(){
  const yr=currentDate.getFullYear(),mo=currentDate.getMonth();
  const p=`${yr}-${String(mo+1).padStart(2,'0')}-01`,u=`${yr}-${String(mo+1).padStart(2,'0')}-${new Date(yr,mo+1,0).getDate()}`;
  const dias=diasRango(p,u),tot=getMesStats(yr,mo);const{h,m}=m2hm(tot.total);
  let txt=`📊 *RESUMEN — ${empresaActiva}*\n${p} → ${u}\n\n`;
  for(const d of dias)if(d.min>0)txt+=`📅 ${d.fecha}: ${d.hstr} · ${d.imp.toFixed(2)} €\n`;
  txt+=`\n✅ *TOTAL: ${h}h ${String(m).padStart(2,'0')}m*\n💰 *${tot.imp.toFixed(2)} €*`;
  window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`,'_blank');
}

// Eventos
$('prevMonthBtn').onclick=()=>{currentDate.setMonth(currentDate.getMonth()-1);renderCal();calcStats()};
$('nextMonthBtn').onclick=()=>{currentDate.setMonth(currentDate.getMonth()+1);renderCal();calcStats()};
$('mananaEntradaAhora').onclick=()=>ahora('mananaEntrada');
$('mananaSalidaAhora').onclick=()=>ahora('mananaSalida');
$('tardeEntradaAhora').onclick=()=>ahora('tardeEntrada');
$('tardeSalidaAhora').onclick=()=>ahora('tardeSalida');
$('saveDayBtn').onclick=guardarDia;
$('clearDayBtn').onclick=limpiar;
$('updateConfigBtn').onclick=()=>{globalRate=parseFloat($('globalHourlyRate').value)||15;minHoursPerDay=parseFloat($('minDailyHours').value)||0;save();renderCal();preview();calcStats()};
$('mesActualBtn').onclick=()=>informeMes(0);
$('mesAnteriorBtn').onclick=()=>informeMes(-1);
$('mesSiguienteBtn').onclick=()=>informeMes(1);
$('rangoLibreBtn').onclick=rangoLibre;
$('pdfMensualBtn').onclick=generarPDF;
$('compartirMensualBtn').onclick=whatsapp;
$('empresaSelect').onchange=cambiarEmpresa;
$('nuevaEmpresaBtn').onclick=nuevaEmpresa;
$('editarEmpresaBtn').onclick=editarEmpresa;
$('eliminarEmpresaBtn').onclick=eliminarEmpresa;
['mananaEntrada','mananaSalida','mananaPausa','tardeEntrada','tardeSalida','tardePausa'].forEach(id=>$(id).addEventListener('input',preview));
document.querySelectorAll('.ntab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
    document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));$(`${btn.dataset.tab}Pane`).classList.add('active');
    if(btn.dataset.tab==='stats')calcStats();
    if(btn.dataset.tab==='calendar')renderCal();
  });
});
load();if(!selectedDateKey)selectedDateKey=today();loadDay(selectedDateKey);
</script>
</body>
</html>
